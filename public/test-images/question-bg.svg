<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%">
      <stop offset="0%" style="stop-color:#e8a020;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e8a020;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <ellipse cx="360" cy="320" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="840" cy="480" rx="350" ry="280" fill="url(#glow2)"/>
  <text x="600" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" opacity="0.15">KAC QUIZ</text>
  <text x="600" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white" opacity="0.1">KNOWLEDGE ASSESSMENT CENTER</text>
