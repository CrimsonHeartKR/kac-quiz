  <circle cx="1050" cy="650" r="120" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="2"/>
  <circle cx="900" cy="200" r="50" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>
  <circle cx="300" cy="600" r="60" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1.5"/>
